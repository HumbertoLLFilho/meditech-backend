version: '3.8'

services:
  meditech:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meditech-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/instance/meditech.db
      - SECRET_KEY=dev_secret_key_change_in_production
    volumes:
      - .:/app
      - meditech-instance:/app/instance
    command: python run.py
    restart: unless-stopped

volumes:
  meditech-instance:
    driver: local

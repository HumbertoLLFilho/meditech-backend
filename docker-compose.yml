version: '3.8'

services:
  # Serviço PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: meditech-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Serviço Flask
  meditech:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meditech-app
    env_file:
      - .env
    environment:
      - FLASK_APP=run.py
      - PYTHONUNBUFFERED=1
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: python run.py
    restart: unless-stopped

volumes:
  postgres_data:
